<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#3b82f6",
                        "background": "#09090b",
                        "surface": "#0f0f12",
                        "on-surface": "#ffffff",
                        "on-surface-variant": "#a1a1aa",
                        "outline-variant": "rgba(255, 255, 255, 0.08)",
                        "surface-container-low": "rgba(15, 15, 18, 0.6)",
                        "surface-container-highest": "rgba(24, 24, 27, 0.8)"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "3xl": "64px",
                        "2xl": "48px",
                        "md": "16px",
                        "xs": "4px",
                        "sm": "8px",
                        "base": "8px",
                        "xl": "32px",
                        "lg": "24px",
                        "margin-desktop": "40px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "body": ["Inter", "sans-serif"],
                        "display": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #09090b; color: #ffffff; font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        
        .matrix-cell { width: 34px; min-width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }
        .sticky-col { position: sticky; left: 0; background-color: #0f0f12; z-index: 20; width: 200px; min-width: 200px; }
        .label-caps { font-size: 10px; color: #71717a; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; }
        
        .glass-panel {
            background: rgba(15, 15, 18, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .checkbox-cell { 
            border: 0.5px solid rgba(255, 255, 255, 0.03); 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            position: relative;
        }
        .checkbox-cell:hover:not(.future) { background: rgba(255, 255, 255, 0.05); }
        
        .led-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .led-dot.active {
            box-shadow: 0 0 10px currentColor;
        }
        .led-hollow {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .today-highlight { background: rgba(59, 130, 246, 0.05) !important; border-left: 1px solid rgba(59, 130, 246, 0.3) !important; border-right: 1px solid rgba(59, 130, 246, 0.3) !important; }
        .today-text { color: #3b82f6 !important; font-weight: 700; }
        
        @keyframes glow {
            0% { opacity: 0.8; }
            50% { opacity: 1; filter: brightness(1.2); }
            100% { opacity: 0.8; }
        }
        .active-glow { animation: glow 2s infinite ease-in-out; }
    </style>
</head>

</div>

</div>
<nav class="flex-1 space-y-1">

<span class="material-symbols-outlined text-[20px]" data-icon="grid_view">grid_view</span>
<span class="text-sm font-medium">Dashboard</span>
</a>
<a class="flex items-center gap-3 px-4 py-2.5 text-on-surface-variant hover:text-white hover:bg-white/5 rounded-lg transition-all duration-200" href="#">
<span class="material-symbols-outlined text-[20px]" data-icon="event_note">event_note</span>
<span class="text-sm font-medium">Planner</span>
</a>
<a class="flex items-center gap-3 px-4 py-2.5 text-primary bg-primary/10 rounded-lg border-l-2 border-primary" href="#">
<span class="material-symbols-outlined text-[20px] fill-1" data-icon="task_alt">task_alt</span>

<button class="mt-4 mx-sm bg-primary text-white py-2.5 px-4 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 hover:brightness-110 active:scale-[0.98] transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span>
        New Task
    </button>
<div class="mt-auto space-y-1 pt-lg border-t border-outline-variant">
<a class="flex items-center gap-3 px-4 py-2.5 text-on-surface-variant hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-[20px]" data-icon="settings">settings</span>
<span class="text-sm font-medium">Settings</span>
</a>
<a class="flex items-center gap-3 px-4 py-2.5 text-on-surface-variant hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-[20px]" data-icon="help">help</span>
<span class="text-sm font-medium">Support</span>

</div>
</aside>
<main class="flex-1 flex flex-col h-full bg-background overflow-hidden relative">
<header class="flex justify-between items-center w-full h-16 px-margin-desktop z-40 bg-background/80 backdrop-blur-md border-b border-outline-variant">
<div class="flex items-center gap-4">

</div>
<div class="flex items-center gap-6">

<span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-white transition-colors" data-icon="notifications">notifications</span>
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-white transition-colors" data-icon="history">history</span>
</div>

</div>
</header>
<div class="flex-1 overflow-auto custom-scrollbar flex flex-col">
<div class="min-w-max p-margin-desktop pt-8">
<div class="glass-panel rounded-2xl overflow-hidden shadow-2xl">
<div class="flex border-b border-outline-variant">
<div class="sticky-col h-14 flex items-center px-lg bg-[#0f0f12]">
<span class="label-caps text-white">Habit Tracker</span>
</div>
<div class="flex">
<script>
                            const days = Array.from({length: 31}, (_, i) => i + 1);
                            const today = 24;
                            document.write(days.map(d => `
                                <div class="matrix-cell border-r border-outline-variant/30 ${d === today ? 'today-highlight' : ''}">
                                    <span class="label-caps font-bold ${d === today ? 'today-text' : 'opacity-40'}">${d}</span>
                                </div>
                            `).join(''));
                        </script>
</div>
</div>
<div class="divide-y divide-outline-variant/20" id="habit-matrix">
<!-- Habits rendered by JS -->
</div>
<div class="flex border-t border-outline-variant bg-[#0f0f12]/50">
<div class="sticky-col flex items-center px-lg py-3 border-r border-outline-variant bg-[#0f0f12]">
<button class="flex items-center gap-2 group transition-all" onclick="addHabit()">
<span class="material-symbols-outlined text-primary text-sm group-hover:rotate-90 transition-transform" data-icon="add_circle">add_circle</span>
<span class="label-caps text-primary">CAPTURE</span>
</button>
</div>
<div class="flex" id="footer-scores">
<!-- Daily counts -->
</div>
</div>
</div>
<div class="grid grid-cols-4 gap-6 mt-10">
<div class="col-span-1 glass-panel p-6 rounded-2xl">
<span class="label-caps mb-4 block opacity-60">Avg Completion</span>
<div class="flex items-baseline gap-2">

<div class="col-span-1 glass-panel p-6 rounded-2xl">

<span class="text-4xl font-bold text-white tracking-tight">42</span>

</div>
</div>
<div class="col-span-2 glass-panel p-6 rounded-2xl flex flex-col justify-between">
<div class="flex justify-between items-center mb-4">
<span class="label-caps opacity-60">Monthly Progress</span>
<span class="label-caps text-primary">78% Target</span>
</div>
<div class="relative w-full bg-zinc-800 h-2 rounded-full overflow-hidden">
<div class="absolute top-0 left-0 bg-primary h-full w-[78%] shadow-[0_0_12px_rgba(59,130,246,0.5)]"></div>
</div>
<div class="flex justify-between mt-4">
<span class="text-[11px] font-medium text-zinc-500 uppercase tracking-widest">24 / 31 Days Tracked</span>
<span class="text-[11px] font-medium text-zinc-500 uppercase tracking-widest">6 Days Left</span>
</div>
</div>
</div>
</div>
</div>
</main>
<script>
    const habits = [
        { name: "Deep Work (4h)", color: "#3b82f6", streak: 12, data: generateData(12, 24) },
        { name: "Daily Exercise", color: "#10b981", streak: 5, data: generateData(5, 24) },
        { name: "Read 20 Pages", color: "#8b5cf6", streak: 2, data: generateData(2, 24) },
        { name: "Meditate 10m", color: "#f59e0b", streak: 8, data: generateData(8, 24) },
        { name: "Sleep by 11PM", color: "#a1a1aa", streak: 0, data: generateData(0, 24) },
        { name: "Hydrate (3L)", color: "#06b6d4", streak: 15, data: generateData(15, 24) }
    ];

    function generateData(streak, today) {
        let data = new Array(31).fill(false);
        for(let i=0; i < today - 1; i++) {
            data[i] = Math.random() > 0.3;
        }
        for(let i = today - 1; i > Math.max(-1, today - 1 - streak); i--) {
            data[i] = true;
        }
        return data;
    }

    function renderHabits() {
        const container = document.getElementById('habit-matrix');
        const footer = document.getElementById('footer-scores');
        const today = 24;

        container.innerHTML = habits.map((habit, hIdx) => `
            <div class="flex group hover:bg-white/[0.02] transition-colors">
                <div class="sticky-col flex items-center justify-between px-lg py-2.5 border-r border-outline-variant/30 group-hover:bg-[#141418]">
                    <div class="flex items-center gap-2.5">
                        <div class="w-1.5 h-1.5 rounded-full shadow-[0_0_8px_currentColor]" style="background-color: ${habit.color}; color: ${habit.color}"></div>
                        <span class="text-[13px] font-medium text-zinc-300 group-hover:text-white transition-colors">${habit.name}</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="text-[10px] font-bold text-zinc-500">${habit.streak}d</span>
                        ${habit.streak >= 5 ? '<span class="text-[10px]">🔥</span>' : ''}
                    </div>
                </div>
                <div class="flex">
                    ${habit.data.map((done, dIdx) => {
                        const isToday = (dIdx + 1) === today;
                        const isFuture = (dIdx + 1) > today;
                        return `
                            <div class="matrix-cell checkbox-cell ${isFuture ? 'future opacity-20' : ''} ${isToday ? 'today-highlight' : ''} border-r border-outline-variant/10" 
                                 onclick="${isFuture ? '' : `toggleCell(${hIdx}, ${dIdx})`}">
                                ${done ? 
                                    `<div class="led-dot active active-glow" style="background-color: ${habit.color}; color: ${habit.color}"></div>` : 
                                    `<div class="led-hollow"></div>`
                                }
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `).join('');

        const dailyCounts = new Array(31).fill(0).map((_, i) => {
            return habits.reduce((acc, h) => acc + (h.data[i] ? 1 : 0), 0);
        });

        footer.innerHTML = dailyCounts.map((count, i) => {
            const isToday = (i + 1) === today;
            let colorClass = "text-zinc-600";
            if(i + 1 <= today) {
                if(count === habits.length) colorClass = "text-emerald-400";
                else if(count > 0) colorClass = "text-primary";
                else colorClass = "text-zinc-500";
            }
            return `
                <div class="matrix-cell border-r border-outline-variant/10 py-2 ${isToday ? 'today-highlight' : ''}">
                    <span class="text-[10px] font-black ${colorClass}">${count}</span>
                </div>
            `;
        }).join('');
    }

    window.toggleCell = function(habitIdx, dayIdx) {
        habits[habitIdx].data[dayIdx] = !habits[habitIdx].data[dayIdx];
        let streak = 0;
        const today = 24;
        for(let i = today-1; i >= 0; i--) {
            if(habits[habitIdx].data[i]) streak++;
            else break;
        }
        habits[habitIdx].streak = streak;
        renderHabits();
    };

    window.addHabit = function() {
        const name = prompt("Enter habit name:");
        if(name) {
            const colors = ["#3b82f6", "#10b981", "#8b5cf6", "#f59e0b", "#ec4899", "#06b6d4"];
            habits.push({
                name: name,
                color: colors[Math.floor(Math.random() * colors.length)],
                streak: 0,
                data: new Array(31).fill(false)
            });
            renderHabits();
        }
    };

    renderHabits();
</script>
</body></html>
