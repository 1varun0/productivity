                                const days = Array.from({length: 31}, (_, i) => i + 1);

                                document.write(days.map(d => `

<script>
        const habits = [
            { name: "Deep Work (4h)", color: "#2170e4", streak: 12, data: generateData(12, 24) },
            { name: "Daily Exercise", color: "#4CAF50", streak: 5, data: generateData(5, 24) },
            { name: "Read 20 Pages", color: "#9C27B0", streak: 2, data: generateData(2, 24) },
            { name: "Meditate 10m", color: "#FF9800", streak: 8, data: generateData(8, 24) },
            { name: "Sleep by 11PM", color: "#607D8B", streak: 0, data: generateData(0, 24) },
            { name: "Hydrate (3L)", color: "#00BCD4", streak: 15, data: generateData(15, 24) }
        ];

        function generateData(streak, today) {
            let data = new Array(31).fill(false);
            // Randomly fill past days
            for(let i=0; i < today - 1; i++) {
                data[i] = Math.random() > 0.3;
            }
            // Ensure current streak is reflected
            for(let i = today - 1; i > Math.max(-1, today - 1 - streak); i--) {
                data[i] = true;
            }
            return data;
        }

        function renderHabits() {
            const container = document.getElementById('habit-matrix');
            const footer = document.getElementById('footer-scores');
            const today = 24;

            container.innerHTML = habits.map(habit => `
                <div class="flex border-b border-outline-variant/5 group">
                    <div class="sticky-col flex items-center justify-between px-lg py-sm border-r border-outline-variant/10 group-hover:bg-surface-container-highest transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full" style="background-color: ${habit.color}"></div>
                            <span class="habit-name">${habit.name}</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <span class="text-[11px] font-bold text-tertiary">${habit.streak}</span>
                            ${habit.streak >= 3 ? '<span class="text-[10px]">🔥</span>' : ''}
                        </div>
                    </div>
                    <div class="flex">
                        ${habit.data.map((done, i) => {
                            const isToday = (i + 1) === today;
                            const isFuture = (i + 1) > today;
                            return `
                                <div class="matrix-cell checkbox-cell ${done ? 'checked' : ''} ${isFuture ? 'future' : ''} ${isToday ? 'today-highlight' : ''}" 
                                     style="${done ? `background-color: ${habit.color}15;` : ''}"
                                     onclick="${isFuture ? '' : `toggleCell(${habits.indexOf(habit)}, ${i})`}">
                                    ${done ? `<span class="material-symbols-outlined text-[14px]" style="color: ${habit.color}; font-variation-settings: 'FILL' 1;">check_circle</span>` : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `).join('');

            // Calculate Footer Scores
            const dailyCounts = new Array(31).fill(0).map((_, i) => {
                return habits.reduce((acc, h) => acc + (h.data[i] ? 1 : 0), 0);
            });

            footer.innerHTML = dailyCounts.map((count, i) => {
                const total = habits.length;
                const ratio = count / total;
                let colorClass = "text-on-surface-variant opacity-20";
                if(i + 1 <= today) {
                    if(ratio === 1) colorClass = "text-green-500";
                    else if(ratio >= 0.5) colorClass = "text-primary";
                    else colorClass = "text-on-surface-variant";
                }
                
                return `
                    <div class="matrix-cell flex items-center justify-center py-md border-b border-outline-variant/10">
                        <span class="font-bold text-[10px] ${colorClass}">${count}</span>
                    </div>
                `;
            }).join('');
        }

        window.toggleCell = function(habitIdx, dayIdx) {
            habits[habitIdx].data[dayIdx] = !habits[habitIdx].data[dayIdx];
            // Simple streak recalculation (backwards from current)
            let streak = 0;
            const today = 24;
            for(let i = today-1; i >= 0; i--) {
                if(habits[habitIdx].data[i]) streak++;
                else break;
            }
            habits[habitIdx].streak = streak;
            renderHabits();
        };

        window.addHabit = function() {
            const name = prompt("Enter habit name:");
            if(name) {
                habits.push({
                    name: name,
                    color: '#' + Math.floor(Math.random()*16777215).toString(16),
                    streak: 0,
                    data: new Array(31).fill(false)
                });
                renderHabits();
            }
        };

        renderHabits();
    </script>
