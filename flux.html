<style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            overflow: hidden;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        #starfield-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        .celestial-system {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sun-container {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .sun-glow-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.4) 0%, transparent 70%);
            filter: blur(20px);
            pointer-events: none;
            transition: transform 0.1s ease-out;
            opacity: 0.6;
        }

        .sun {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: #0f0f0f;
            box-shadow: inset 0 0 40px rgba(6, 182, 212, 0.1), 0 0 20px rgba(6, 182, 212, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 11;
            transition: transform 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .timer-text {
            font-family: 'Inter', sans-serif;
            font-size: 56px;
            font-weight: 300;
            letter-spacing: -1px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
            z-index: 12;
        }

        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            pointer-events: none;
        }

        .orbit-1 { width: 380px; height: 380px; }
        .orbit-2 { width: 520px; height: 520px; }
        .orbit-3 { width: 680px; height: 680px; }
        .orbit-4 { width: 840px; height: 840px; }
        .orbit-5 { width: 1000px; height: 1000px; }

        .planet-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .planet-p1 {
            width: 14px; height: 14px; top: -7px; left: calc(50% - 7px);
            background: radial-gradient(circle at 30% 30%, #8a7a6c, #4a3f35, #1a1613);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.9), 0 0 10px rgba(138, 122, 108, 0.2);
        }
        .planet-p2 {
            width: 22px; height: 22px; top: calc(50% - 11px); right: -11px;
            background: radial-gradient(circle at 40% 40%, #e3bb76 0%, #a37c5b 50%, #5c3a21 100%);
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.8), 0 0 15px rgba(227, 187, 118, 0.2);
        }
        .planet-p3 {
            width: 18px; height: 18px; bottom: -9px; left: calc(50% - 9px);
            background: radial-gradient(circle at 35% 35%, #7dd3fc 0%, #0284c7 60%, #082f49 100%);
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.8), 0 0 12px rgba(125, 211, 252, 0.2);
        }
        .planet-p4 {
            width: 28px; height: 28px; top: calc(50% - 14px); left: -14px;
            background: radial-gradient(circle at 40% 40%, #d4d4d8 0%, #71717a 50%, #27272a 100%);
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.8), 0 0 15px rgba(212, 212, 216, 0.2);
        }
        .planet-p5 {
            width: 20px; height: 20px; top: -10px; left: calc(50% - 10px);
            background: radial-gradient(circle at 30% 30%, #fca5a5 0%, #dc2626 60%, #450a0a 100%);
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.8), 0 0 12px rgba(252, 165, 165, 0.2);
        }

        .planet:hover { transform: scale(1.4); }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 32px;
        }

        .ui-element {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 9999px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .ui-element:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .dock {
            pointer-events: auto;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .dock-btn {
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .dock-btn:hover { color: #fff; transform: scale(1.05); }
        .dock-btn.active { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    </style>
</head>

<script>
        function generateStarfield() {
            const container = document.getElementById('starfield-container');
            const starCount = 450;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                const size = Math.random() * 1.8 + 0.4;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                
                // Varied animation settings for natural asynchronous effect
                const duration = 2 + Math.random() * 4; // 2s to 6s
                const delay = Math.random() * 5; // Up to 5s offset
                const initialOpacity = 0.2 + Math.random() * 0.4;

                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${x}%`;
                star.style.top = `${y}%`;
                star.style.opacity = initialOpacity;
                
                // Applying the asynchronous twinkling animation
                star.style.animation = `twinkle ${duration}s ease-in-out ${delay}s infinite alternate`;
                
                container.appendChild(star);
            }
        }

        generateStarfield();

        window.addEventListener('mousemove', (e) => {
            const sunGlow = document.getElementById('sun-glow');
            const sunRect = document.getElementById('sun-container').getBoundingClientRect();
            const sunCenterX = sunRect.left + sunRect.width / 2;
            const sunCenterY = sunRect.top + sunRect.height / 2;
            
            const dx = (e.clientX - sunCenterX) * 0.15;
            const dy = (e.clientY - sunCenterY) * 0.15;
            
            sunGlow.style.transform = `translate(${dx}px, ${dy}px)`;

            const planets = document.querySelectorAll('.planet');
            planets.forEach(planet => {
                const rect = planet.getBoundingClientRect();
                const pCenterX = rect.left + rect.width / 2;
                const pCenterY = rect.top + rect.height / 2;
                const dist = Math.hypot(e.clientX - pCenterX, e.clientY - pCenterY);
                
                if (dist < 150) {
                    const pullX = (e.clientX - pCenterX) * 0.12;
                    const pullY = (e.clientY - pCenterY) * 0.12;
                    planet.style.transform = `translate(${pullX}px, ${pullY}px) scale(1.15)`;
                } else {
                    planet.style.transform = '';
                }
            });
        });

        let timeLeft = 25 * 60;
        const timerDisplay = document.getElementById('focus-timer');
        const timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }, 1000);

        const sun = document.getElementById('sun-timer');
        sun.addEventListener('click', () => {
            sun.style.transform = 'scale(0.96)';
            setTimeout(() => { sun.style.transform = ''; }, 150);
        });
    </script>
